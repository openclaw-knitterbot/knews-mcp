name: Build MCPB Bundle

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            suffix: windows
          - os: macos-latest
            suffix: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies into lib/
        run: pip install --target=lib mcp httpx

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Build .mcpb bundle
        run: mcpb pack

      - name: Rename bundle
        run: |
          mv knews-mcp.mcpb knews-mcp-${{ matrix.suffix }}.mcpb

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: knews-mcp-${{ matrix.suffix }}.mcpb

      - name: Upload as artifact (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: knews-mcp-${{ matrix.suffix }}
          path: knews-mcp-${{ matrix.suffix }}.mcpb
